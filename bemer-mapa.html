<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gabinety z BEMER® w Polsce</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --dark:#1c1a17;
    --cream:#f7f3ee;
    --gold:#b8965a;
    --gold2:#d4b07a;
    --red:#c0392b;
    --red2:#e74c3c;
    --mid:#5c5650;
  }
  html,body{height:100%;overflow:hidden}
  body{font-family:'Jost',sans-serif;background:var(--dark);color:var(--cream)}

  /* HEADER */
  header{
    position:fixed;top:0;left:0;right:0;z-index:100;
    padding:18px 32px;
    background:rgba(28,26,23,0.92);
    backdrop-filter:blur(12px);
    border-bottom:1px solid rgba(184,150,90,0.2);
    display:flex;align-items:center;justify-content:space-between;
  }
  .logo{
    font-family:'Cormorant Garamond',serif;
    font-size:13px;letter-spacing:.35em;color:var(--gold);
    text-transform:uppercase;
  }
  .header-title{
    font-family:'Cormorant Garamond',serif;
    font-size:clamp(15px,2.5vw,20px);
    font-weight:300;color:var(--cream);
    letter-spacing:.08em;
  }
  .header-count{
    font-size:11px;letter-spacing:.3em;color:var(--gold);
    text-transform:uppercase;
  }

  /* MAP */
  #map{
    position:fixed;
    top:72px;left:0;right:0;bottom:0;
  }

  /* CUSTOM POPUP */
  .popup-wrap{
    font-family:'Jost',sans-serif;
    min-width:220px;max-width:280px;
  }
  .popup-name{
    font-family:'Cormorant Garamond',serif;
    font-size:17px;font-weight:400;
    color:var(--dark);margin-bottom:4px;
  }
  .popup-city{
    font-size:11px;letter-spacing:.25em;
    color:var(--red);text-transform:uppercase;
    margin-bottom:8px;
  }
  .popup-addr{
    font-size:12px;font-weight:300;
    color:var(--mid);line-height:1.55;
    margin-bottom:8px;
  }
  .popup-badge{
    display:inline-block;
    background:var(--dark);color:var(--gold);
    font-size:10px;letter-spacing:.2em;text-transform:uppercase;
    padding:4px 10px;
  }

  /* LEGEND */
  .legend{
    position:fixed;bottom:24px;left:24px;z-index:100;
    background:rgba(28,26,23,0.9);
    backdrop-filter:blur(12px);
    border:1px solid rgba(184,150,90,0.2);
    padding:16px 20px;
    max-width:220px;
  }
  .legend-title{
    font-size:10px;letter-spacing:.35em;color:var(--gold);
    text-transform:uppercase;margin-bottom:12px;
  }
  .legend-item{
    display:flex;align-items:center;gap:10px;
    font-size:12px;font-weight:300;color:rgba(255,255,255,.6);
    margin-bottom:6px;
  }
  .legend-pin{
    width:12px;height:12px;
    background:var(--red);border-radius:50% 50% 50% 0;
    transform:rotate(-45deg);flex-shrink:0;
  }

  /* COUNTER */
  .counter{
    position:fixed;bottom:24px;right:24px;z-index:100;
    background:rgba(28,26,23,0.9);
    backdrop-filter:blur(12px);
    border:1px solid rgba(184,150,90,0.2);
    padding:16px 24px;
    text-align:center;
  }
  .counter-num{
    font-family:'Cormorant Garamond',serif;
    font-size:48px;font-weight:300;color:var(--gold2);line-height:1;
  }
  .counter-label{
    font-size:10px;letter-spacing:.25em;color:rgba(255,255,255,.4);
    text-transform:uppercase;margin-top:4px;
  }
</style>
</head>
<body>

<header>
  <div class="logo">BEMER® · Beauty</div>
  <div class="header-title">Gabinety z BEMER® w Polsce</div>
  <div class="header-count">14 lokalizacji</div>
</header>

<div id="map"></div>

<div class="legend">
  <div class="legend-title">Legenda</div>
  <div class="legend-item"><div class="legend-pin"></div>Gabinet z BEMER®</div>
  <div class="legend-item" style="margin-top:10px;font-size:11px;color:rgba(255,255,255,.35);line-height:1.5">Kliknij w pinezkę aby zobaczyć szczegóły</div>
</div>

<div class="counter">
  <div class="counter-num">14</div>
  <div class="counter-label">Gabinetów w Polsce</div>
</div>

<script>
const SALONS = [
  {name:"Salon Kobiet Sukcesu",city:"Nysa",addr:"ul. Sudecka 6a/2",lat:50.4659347,lng:17.3396564},
  {name:"Gabinet Zdrowej Skóry",city:"Warszawa",addr:"ul. Związku Walki Młodych 13/204",lat:52.1591627,lng:21.0381223},
  {name:"Instytut Holispace",city:"Warszawa",addr:"ul. Św. Wincentego 93/U7",lat:52.2933029,lng:21.0520097},
  {name:"Pomoc Stopom",city:"Wrocław",addr:"ul. Krawiecka 3/9",lat:51.1092286,lng:17.0381712},
  {name:"nPosh Beauty",city:"Osielsko",addr:"ul. Narcyzowa 4",lat:53.186252,lng:18.0742268},
  {name:"Studio Urody Discolor",city:"Warszawa",addr:"ul. Światowida 49/35",lat:52.3190807,lng:20.9505301},
  {name:"AG Clinic",city:"Żory",addr:"ul. Folwarecka 1H",lat:50.0433798,lng:18.6861331},
  {name:"Studio Sante Klinika Zdrowia",city:"Warszawa",addr:"ul. Jagiellońska 5a",lat:52.2701359,lng:21.0163274},
  {name:"Forum Holistic Spa & Wellness",city:"Lublin",addr:"ul. Obywatelska 8",lat:51.2586133,lng:22.5711689},
  {name:"Alicja Klyszcz Personal Skin Trainer",city:"Wrocław",addr:"ul. Stanisława Drabika 31/4",lat:51.0601984,lng:17.0532188},
  {name:"Salon Beaute",city:"Warszawa",addr:"ul. Skoroszewska 1B",lat:52.191301,lng:20.901611},
  {name:"JDW Beauty Clinic",city:"Katowice",addr:"ul. Michałowskiego 61",lat:50.1869969,lng:18.9678998},
  {name:"Hair Haven Spa",city:"Lubin",addr:"ul. Cedrowa 3C",lat:51.402363,lng:16.191081},
  {name:"Hotel Alma MED & Spa",city:"Barlinek",addr:"ul. Strzelecka 6a",lat:52.9933422,lng:15.2214125}
];

function initMap() {
  const map = new google.maps.Map(document.getElementById('map'), {
    center: {lat: 52.0, lng: 19.5},
    zoom: 6,
    mapTypeId: 'roadmap',
    styles: [
      {elementType:'geometry',stylers:[{color:'#1a1a2e'}]},
      {elementType:'labels.text.fill',stylers:[{color:'#8a7f72'}]},
      {elementType:'labels.text.stroke',stylers:[{color:'#1c1a17'}]},
      {featureType:'administrative',elementType:'geometry',stylers:[{color:'#2d2b28'}]},
      {featureType:'administrative.country',elementType:'labels.text.fill',stylers:[{color:'#9d8b78'}]},
      {featureType:'administrative.land_parcel',stylers:[{visibility:'off'}]},
      {featureType:'administrative.locality',elementType:'labels.text.fill',stylers:[{color:'#bfae9e'}]},
      {featureType:'poi',elementType:'labels.text.fill',stylers:[{color:'#7a6e66'}]},
      {featureType:'poi.park',elementType:'geometry',stylers:[{color:'#1e2a1e'}]},
      {featureType:'poi.park',elementType:'labels.text.fill',stylers:[{color:'#4a5e4a'}]},
      {featureType:'road',elementType:'geometry',stylers:[{color:'#2d2b28'}]},
      {featureType:'road',elementType:'geometry.stroke',stylers:[{color:'#1a1917'}]},
      {featureType:'road',elementType:'labels.text.fill',stylers:[{color:'#7a7068'}]},
      {featureType:'road.highway',elementType:'geometry',stylers:[{color:'#3a3630'}]},
      {featureType:'road.highway',elementType:'geometry.stroke',stylers:[{color:'#252320'}]},
      {featureType:'road.highway',elementType:'labels.text.fill',stylers:[{color:'#b8965a'}]},
      {featureType:'transit',elementType:'geometry',stylers:[{color:'#2a2825'}]},
      {featureType:'transit.station',elementType:'labels.text.fill',stylers:[{color:'#7a6e66'}]},
      {featureType:'water',elementType:'geometry',stylers:[{color:'#0d1b2a'}]},
      {featureType:'water',elementType:'labels.text.fill',stylers:[{color:'#3a5a7a'}]},
      {featureType:'water',elementType:'labels.text.stroke',stylers:[{color:'#0d1b2a'}]}
    ],
    disableDefaultUI: false,
    zoomControl: true,
    mapTypeControl: false,
    streetViewControl: false,
    fullscreenControl: true
  });

  // Custom red pin SVG
  const pinSVG = {
    path: 'M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5S10.62 6.5 12 6.5s2.5 1.12 2.5 2.5S13.38 11.5 12 11.5z',
    fillColor: '#c0392b',
    fillOpacity: 1,
    strokeColor: '#922b21',
    strokeWeight: 1.5,
    scale: 1.6,
    anchor: new google.maps.Point(12, 22)
  };

  SALONS.forEach(salon => {
    const marker = new google.maps.Marker({
      position: {lat: salon.lat, lng: salon.lng},
      map: map,
      icon: pinSVG,
      title: salon.name,
      animation: google.maps.Animation.DROP
    });

    const infoWindow = new google.maps.InfoWindow({
      content: `
        <div class="popup-wrap">
          <div class="popup-name">${salon.name}</div>
          <div class="popup-city">● ${salon.city}</div>
          <div class="popup-addr">${salon.addr}, ${salon.city}</div>
          <div class="popup-badge">BEMER® w gabinecie</div>
        </div>
      `
    });

    marker.addListener('click', () => {
      infoWindow.open(map, marker);
    });
  });
}
</script>

<script async defer
  src="https://maps.googleapis.com/maps/api/js?key=AIzaSyD-9tSrke72PouQMnMX-a7eZSW0jkFMBWY&callback=initMap">
</script>

</body>
</html>
