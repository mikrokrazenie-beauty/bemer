<!DOCTYPE html>

<head>

<title>Gabinety z BEMER® w Polsce</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{--dark:#1c1a17;--cream:#f7f3ee;--gold:#b8965a;--gold2:#d4b07a;--red:#c0392b;--mid:#5c5650;}
  html,body{height:100%;overflow:hidden}
  body{font-family:'Jost',sans-serif;background:var(--dark);color:var(--cream)}
  header{
    position:fixed;top:0;left:0;right:0;z-index:1000;
    padding:16px 28px;background:rgba(28,26,23,0.95);
    backdrop-filter:blur(12px);border-bottom:1px solid rgba(184,150,90,0.2);
    display:flex;align-items:center;justify-content:space-between;
  }
  .logo{font-family:'Cormorant Garamond',serif;font-size:13px;letter-spacing:.35em;color:var(--gold);text-transform:uppercase;}
  .header-title{font-family:'Cormorant Garamond',serif;font-size:clamp(14px,2.5vw,20px);font-weight:300;color:var(--cream);}
  .header-count{font-size:11px;letter-spacing:.3em;color:var(--gold);text-transform:uppercase;}
  #map{position:fixed;top:64px;left:0;right:0;bottom:0;z-index:1;}
  .counter{position:fixed;bottom:24px;right:24px;z-index:1000;background:rgba(28,26,23,0.92);border:1px solid rgba(184,150,90,0.2);padding:14px 22px;text-align:center;}
  .counter-num{font-family:'Cormorant Garamond',serif;font-size:44px;font-weight:300;color:var(--gold2);line-height:1;}
  .counter-label{font-size:10px;letter-spacing:.25em;color:rgba(255,255,255,.4);text-transform:uppercase;margin-top:4px;}
  .leaflet-popup-content-wrapper{background:#fff;border-radius:0;box-shadow:0 8px 32px rgba(0,0,0,.25);border-left:3px solid #c0392b;}
  .leaflet-popup-tip{background:#fff;}
  .popup-name{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:400;color:#1c1a17;margin-bottom:4px;}
  .popup-city{font-size:11px;letter-spacing:.25em;color:#c0392b;text-transform:uppercase;margin-bottom:6px;}
  .popup-addr{font-size:12px;font-weight:300;color:#5c5650;line-height:1.55;margin-bottom:8px;}
  .popup-badge{display:inline-block;background:#1c1a17;color:#b8965a;font-size:10px;letter-spacing:.2em;text-transform:uppercase;padding:4px 10px;}
</style>

<body>
<header>
  <div class="logo">BEMER® · Beauty</div>
  <div class="header-title">Gabinety z BEMER® w Polsce</div>
  <div class="header-count">14 lokalizacji</div>
</header>
<div id="map"></div>
<div class="counter">
  <div class="counter-num">14</div>
  <div class="counter-label">Gabinetów w Polsce</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
window.addEventListener('load', function() {
  var map = L.map('map').setView([52.0, 19.5], 6);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
    maxZoom: 19
  }).addTo(map);

  var redIcon = L.divIcon({
    className: '',
    html: '<svg width="28" height="40" viewBox="0 0 28 40" xmlns="http://www.w3.org/2000/svg"><path d="M14 0C6.27 0 0 6.27 0 14c0 9.75 14 26 14 26S28 23.75 28 14C28 6.27 21.73 0 14 0z" fill="#c0392b"/><circle cx="14" cy="14" r="6" fill="white" opacity="0.9"/><circle cx="14" cy="14" r="3" fill="#c0392b"/></svg>',
    iconSize: [28, 40],
    iconAnchor: [14, 40],
    popupAnchor: [0, -42]
  });

  var salons = [
    {name:"Salon Kobiet Sukcesu",city:"Nysa",addr:"ul. Sudecka 6a/2",lat:50.4659347,lng:17.3396564},
    {name:"Gabinet Zdrowej Skóry",city:"Warszawa",addr:"ul. Związku Walki Młodych 13/204",lat:52.1591627,lng:21.0381223},
    {name:"Instytut Holispace",city:"Warszawa",addr:"ul. Św. Wincentego 93/U7",lat:52.2933029,lng:21.0520097},
    {name:"Pomoc Stopom",city:"Wrocław",addr:"ul. Krawiecka 3/9",lat:51.1092286,lng:17.0381712},
    {name:"nPosh Beauty",city:"Osielsko",addr:"ul. Narcyzowa 4",lat:53.186252,lng:18.0742268},
    {name:"Studio Urody Discolor",city:"Warszawa",addr:"ul. Światowida 49/35",lat:52.3190807,lng:20.9505301},
    {name:"AG Clinic",city:"Żory",addr:"ul. Folwarecka 1H",lat:50.0433798,lng:18.6861331},
    {name:"Studio Sante Klinika Zdrowia",city:"Warszawa",addr:"ul. Jagiellońska 5a",lat:52.2701359,lng:21.0163274},
    {name:"Forum Holistic Spa & Wellness",city:"Lublin",addr:"ul. Obywatelska 8",lat:51.2586133,lng:22.5711689},
    {name:"Alicja Klyszcz Personal Skin Trainer",city:"Wrocław",addr:"ul. Stanisława Drabika 31/4",lat:51.0601984,lng:17.0532188},
    {name:"Salon Beaute",city:"Warszawa",addr:"ul. Skoroszewska 1B",lat:52.191301,lng:20.901611},
    {name:"JDW Beauty Clinic",city:"Katowice",addr:"ul. Michałowskiego 61",lat:50.1869969,lng:18.9678998},
    {name:"Hair Haven Spa",city:"Lubin",addr:"ul. Cedrowa 3C",lat:51.402363,lng:16.191081},
    {name:"Hotel Alma MED & Spa",city:"Barlinek",addr:"ul. Strzelecka 6a",lat:52.9933422,lng:15.2214125}
  ];

  salons.forEach(function(s) {
    L.marker([s.lat, s.lng], {icon: redIcon})
      .addTo(map)
      .bindPopup(
        '<div class="popup-name">'+s.name+'</div>' +
        '<div class="popup-city">● '+s.city+'</div>' +
        '<div class="popup-addr">'+s.addr+', '+s.city+'</div>' +
        '<div class="popup-badge">BEMER® w gabinecie</div>'
      );
  });
});
</script>
</body>
